<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counselor Dashboard</title>
    
    <!-- CSS Links -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>Counselor Dashboard</h1>
        <p>System overview and statistics</p>
    </div>
    
    <!-- STAT CARDS WITH DYNAMIC JS IDs -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Cases</h3>
            <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <h3>In Progress</h3>
            <div class="stat-value" id="stat-progress">0</div>
        </div>
        <div class="stat-card">
            <h3>Resolved / Closed</h3>
            <div class="stat-value" id="stat-resolved">0</div>
        </div>
        <div class="stat-card">
            <h3>Open / Pending</h3>
            <div class="stat-value" id="stat-upcoming">0</div>
        </div>
    </div>

    <!-- CHARTS GRID -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>Cases per Month</h3>
            <!-- Replaced inline styles with a responsive class -->
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Status Distribution</h3>
            <!-- Replaced inline styles with a responsive class -->
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- Chart.js Library -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase Logic Script -->
<script type="module" src="assets/js/dashboard.js"></script>

</body>
</html>
