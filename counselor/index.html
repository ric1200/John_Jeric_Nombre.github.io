<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counselor Login</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css" />
  
  <style>
    .error-msg {
      background-color: #ffe6e6;
      color: #d9534f;
      border: 1px solid #d9534f;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <a href="https://ric1200.github.io/John_Jeric_Nombre.github.io/index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </a>

  <div class="login-container">
    
    <div class="left-section">
      <div class="overlay">
        <h1>UCL Counseling Office</h1>
        <p>Guiding students towards mental wellness and success.</p>
      </div>
    </div>

    <div class="right-section">
      <form id="loginForm" class="login-form">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to access your counselor dashboard</p>

        <!-- Error message container -->
        <div id="error-message" class="error-msg"></div>

        <label for="username">Email Address</label>
        <input type="email" id="username" name="username" required autocomplete="email" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
        
        <div style="margin-top: 8px; font-size: 14px; display: flex; align-items: center; gap: 5px;">
          <input type="checkbox" id="showPassword" />
          <label for="showPassword" style="margin: 0; cursor: pointer;">Show Password</label>
        </div>

        <button type="submit" id="loginBtn" class="login-btn">Login</button>
      
        <div class="links">
            <a href="forgot-password.html">Forgot your password?</a>
        </div>

        <div class="footer">
          © 2026 UCL Counseling Office. All rights reserved.
        </div>
      </form>
    </div>

  </div>

  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
