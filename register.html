<!-- register.html -->
<div class="container">
    <h2>Student Registration</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="studentId">Student ID (This will be your Username)</label>
            <input type="text" id="studentId" placeholder="e.g. 03-2021-01234" required>
        </div>
        
        <div class="form-group">
            <label for="email">PHINMA Email</label>
            <input type="email" id="email" placeholder="e.g. judelecruz@phinmaed.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" id="registerBtn">Register</button>
    </form>
</div>

<script type="module" src="assets/js/register.js"></script>
