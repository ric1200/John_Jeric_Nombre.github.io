<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New User</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div class="main-content">
    <div class="container" style="max-width: 600px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
      <h2>Add New System User</h2>
      <p>Create a new account for an Admin or Counselor.</p>
      <hr>

      <form id="addUserForm">
        <label for="role">User Role</label>
        <select id="role" required style="width: 100%; padding: 8px; margin-bottom: 15px;">
          <option value="" disabled selected>-- Select Role --</option>
          <option value="admin">Admin</option>
          <option value="counselor">Counselor</option>
        </select>

        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="user@ucl.edu.ph" style="width: 100%; padding: 8px; margin-bottom: 15px;" />

        <label for="password">Temporary Password</label>
        <input type="password" id="password" required placeholder="At least 6 characters" style="width: 100%; padding: 8px; margin-bottom: 15px;" />

        <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer;">Register User</button>
      </form>
      
      <div id="message" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
  </div>

  <script type="module" src="../assets/js/add_user.js"></script>
</body>
</html>
