<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New User</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

  <!-- Sidebar Container -->
  <div id="sidebar-container"></div>

  <div class="main-content">
    <div class="container" style="max-width: 600px; margin-top: 50px;">
      <h2>Add New System User</h2>
      <p>Create a new account for an Admin or Counselor.</p>
      <hr>

      <form id="addUserForm">
        <!-- Role Selector -->
        <label for="role">User Role</label>
        <select id="role" required>
          <option value="" disabled selected>-- Select Role --</option>
          <option value="admin">Admin</option>
          <option value="counselor">Counselor</option>
        </select>

        <!-- Common Fields -->
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="user@ucl.edu.ph" />

        <label for="password">Temporary Password</label>
        <input type="password" id="password" required placeholder="At least 6 characters" />

        <!-- Dynamic Fields for Admin only -->
        <div id="admin-fields" style="display: none;">
          <label for="department">Department</label>
          <input type="text" id="department" placeholder="e.g., ECS, CBA, Guidance" />
        </div>

        <!-- Dynamic Fields for Counselor only -->
        <div id="counselor-fields" style="display: none;">
          <label for="specialization">Specialization</label>
          <input type="text" id="specialization" placeholder="e.g., Mental Health, Career" />

          <label for="office_location">Office Location</label>
          <input type="text" id="office_location" placeholder="e.g., ECS-106" />
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 20px;">Register User</button>
      </form>
      
      <div id="message" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
  </div>

  <!-- JavaScript Module -->
  <script type="module" src="../assets/js/add_user.js"></script>
</body>
</html>
