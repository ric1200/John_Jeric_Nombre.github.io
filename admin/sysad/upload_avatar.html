<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile Picture | UCL Counseling System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css"> 
    <link rel="stylesheet" href="../assets/css/upload_avatar.css"> 
    <link rel="stylesheet" href="../includes/sidebar.css">
</head>
<body>
    
    <!-- Dito papasok ang Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>Update Profile Picture</h1>
                <p>Hello, <span id="user-greeting" style="font-weight: bold;">Admin</span>! Enhance your profile look.</p>
            </div>
            
            <div class="data-card" style="max-width: 500px; margin: 0 auto; padding: 30px; text-align: center;">
                <form id="avatar-form">
                    
                    <!-- Modern Drag & Drop Zone / Preview Box -->
                    <div id="drop-zone" class="upload-drop-zone" style="border: 2px dashed #cbd5e1; padding: 30px; border-radius: 12px; cursor: pointer; background: #f8fafc; transition: all 0.3s ease; margin-bottom: 25px;">
                        <div class="preview-box" style="margin-bottom: 15px;">
                            <img id="imgPreview" src="../assets/image/default_admin.png" alt="Avatar Preview" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                        </div>
                        <div class="drop-zone-text" style="color: #64748b;">
                            <i class="fas fa-cloud-upload-alt fa-2x" style="color: #3b82f6; margin-bottom: 8px;"></i>
                            <p style="margin: 5px 0; font-weight: 500;">Drag & drop your image here</p>
                            <span style="font-size: 0.85rem; color: #94a3b8;">or <strong style="color: #3b82f6;">Browse File</strong></span>
                        </div>
                        <!-- Nakatagong tunay na input, ma-ti-trigger via click sa drop-zone -->
                        <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/jpg" style="display: none;">
                    </div>
                    
                    <div class="btn-group" style="display: flex; gap: 15px; justify-content: center;">
                        <button type="submit" id="upload-btn" class="btn btn-upload" style="padding: 10px 24px; border-radius: 6px; background: #3b82f6; color: white; border: none; font-weight: 500; cursor: pointer;" disabled>
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a href="profile.html" class="btn btn-cancel" style="padding: 10px 24px; border-radius: 6px; background: #e2e8f0; color: #475569; text-decoration: none; font-weight: 500;">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- JS Logic para sa Image Upload -->
    <script type="module" src="../assets/js/upload_avatar.js"></script>
</body>
</html>
