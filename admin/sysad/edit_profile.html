<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | UCL Counseling System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css"> 
    <link rel="stylesheet" href="../assets/css/edit_profile.css"> 
    <link rel="stylesheet" href="../includes/sidebar.css">
</head>
<form id="edit-profile-form">
    <div class="section-title"><i class="fas fa-user-circle"></i> Personal Information</div>
    <div class="form-grid">
        <div class="form-group">
            <label>First Name</label>
            <input type="text" id="first_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="last_name" class="form-control" required>
        </div>
    </div>
    
    <div class="form-actions">
        <button type="submit" id="save-btn" class="btn btn-save">Save Changes</button>
        <a href="profile.html" class="btn btn-cancel">Cancel</a>
    </div>
</form></html>
