<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | UCL Counseling System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css"> 
    <link rel="stylesheet" href="../assets/css/edit_profile.css"> 
    <link rel="stylesheet" href="../includes/sidebar.css">
</head>
<body>

    <!-- Dito papasok ang Sidebar -->
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>Edit System Profile</h1>
                <p>Manage your personal details and contact information.</p>
            </div>

            <div class="data-card">
                <form id="edit-profile-form">
                    
                    <div class="section-title"><i class="fas fa-user-circle"></i> Personal Information</div>
                    <!-- Added 'two-cols' class to utilize your existing CSS properly -->
                    <div class="form-grid two-cols">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="first_name" class="form-control" placeholder="e.g. Juan" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="last_name" class="form-control" placeholder="e.g. Dela Cruz" required>
                        </div>
                    </div>
                    
                    <br>

                    <div class="section-title"><i class="fas fa-address-book"></i> Contact Information</div>
                    <div class="form-grid two-cols">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" id="phone_number" class="form-control" placeholder="e.g. 09123456789" required>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="address" class="form-control" placeholder="e.g. 123 Main St, Brgy. San Jose" required>
                        </div>
                    </div>
                    
                    <div class="form-actions" style="margin-top: 20px;">
                        <button type="submit" id="save-btn" class="btn btn-save">
                            <i class="fas fa-check-circle"></i> Save Changes
                        </button>
                        <a href="profile.html" class="btn btn-cancel">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- JS Logic para sa Edit Profile -->
    <script type="module" src="../assets/js/edit_profile.js"></script>

</body>
</html>
